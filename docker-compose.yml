services:
  mysql:
    image: mysql:8.4
    container_name: campusconnect-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: campusconnect
    ports:
      - "3306:3306"
    volumes:
      - campusconnect_mysql_data:/var/lib/mysql

volumes:
  campusconnect_mysql_data:
